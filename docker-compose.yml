version: '3.8'

services:
  landing-lora:
    build: .
    container_name: landing-lora-react
    restart: unless-stopped
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # Publicado como path del sitio principal: alystechpy.online/lora
      # (no subdominio) — prioridad alta para ganarle al router raíz de apps/web.
      - "traefik.http.routers.landing-lora.rule=(Host(`alystechpy.online`) || Host(`www.alystechpy.online`)) && PathPrefix(`/lora`)"
      - "traefik.http.routers.landing-lora.entrypoints=https"
      - "traefik.http.routers.landing-lora.tls.certresolver=letsencrypt"
      - "traefik.http.routers.landing-lora.priority=1200"
      - "traefik.http.routers.landing-lora.middlewares=landing-lora-stripprefix"
      - "traefik.http.middlewares.landing-lora-stripprefix.stripprefix.prefixes=/lora"
      - "traefik.http.services.landing-lora.loadbalancer.server.port=80"

networks:
  coolify:
    external: true